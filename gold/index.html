<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイピングゲーム（Gold版・お手本）</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <h1>⌨️ タイピングゲーム <span class="badge">Gold版・お手本</span></h1>

    <!-- スコアやタイマーの表示エリア -->
    <div class="status">
      <div class="status-item">
        <span class="label">スコア</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="status-item">
        <span class="label">のこり時間</span>
        <span id="time" class="value">60</span>
      </div>
      <div class="status-item">
        <span class="label">ミス</span>
        <span id="miss" class="value">0</span>
      </div>
    </div>

    <!-- お題の単語 -->
    <div id="word" class="word">スタートボタンをおしてね</div>

    <!-- 入力中の文字 -->
    <div id="typed" class="typed"></div>

    <!-- 入力欄（画面には見せず、キー入力を受け取る用） -->
    <input id="input" class="hidden-input" type="text" autocomplete="off" />

    <!-- ボタン -->
    <button id="startBtn" class="start-btn">スタート</button>

    <!-- 結果表示 -->
    <div id="result" class="result"></div>

    <p class="hint">※ このゲームは自由に作りかえてOK！ <code>script.js</code> や <code>style.css</code> をいじってみよう。</p>
    <p class="back"><a href="./sandbox/">🧪 JS練習（サンドボックス）へ</a></p>
    <p class="back"><a href="../">← ポータルにもどる</a></p>
  </div>

  <script src="./script.js"></script>
</body>
</html>
