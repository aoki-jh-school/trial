<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript サンドボックス（Gold版・お手本）</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="header">
    <h1>🧪 JavaScript サンドボックス <span style="font-size:1rem;color:#f9a825;">Gold版・お手本</span></h1>
    <p class="lead">
      コードを書いて「▶ 実行」ボタンを押すと、結果が下に出ます。<br />
      まず<strong>結果を予想してから</strong>実行してみよう！
    </p>
    <p class="note">💡 <code>console.log(...)</code> の結果はこのページの中に出るので、開発者ツール（DevTools）は開かなくてOKです。</p>
  </header>

  <!-- 効果音ボタン（10種類） -->
  <section class="sound-panel">
    <h2>🔊 効果音ボタン（10種類）</h2>
    <p class="sound-lead">
      ボタンをクリックすると音が鳴ります。<br />
      同じ音は上のエディタからも <code>playCoin()</code> のように呼び出せます！
    </p>
    <div class="sound-buttons">
      <button class="sound-btn" onclick="playBeep()">🔔 ビープ</button>
      <button class="sound-btn" onclick="playCorrect()">⭕ ピンポン（正解）</button>
      <button class="sound-btn" onclick="playWrong()">❌ ブブー（不正解）</button>
      <button class="sound-btn" onclick="playCoin()">🪙 コイン</button>
      <button class="sound-btn" onclick="playJump()">🦘 ジャンプ</button>
      <button class="sound-btn" onclick="playLaser()">🔫 レーザー</button>
      <button class="sound-btn" onclick="playExplosion()">💥 ばくはつ</button>
      <button class="sound-btn" onclick="playPowerUp()">⬆️ パワーアップ</button>
      <button class="sound-btn" onclick="playClick()">👆 クリック</button>
      <button class="sound-btn" onclick="playFanfare()">🎺 ファンファーレ</button>
    </div>
  </section>

  <!-- 各レッスンのカードは script.js から自動で作られます -->
  <main id="lessons" class="lessons"></main>

  <p class="back"><a href="../">← Gold版のゲームにもどる</a></p>

  <script src="./script.js"></script>
</body>
</html>
